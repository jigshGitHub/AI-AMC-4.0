<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Chat with RealEstate Agent</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Chat with RealEstate Agent</h1>
      <div id="chat" class="chat"></div>
      <div id="sources-panel" class="sources-panel" style="display:none;">
        <button id="toggle-sources" class="toggle-sources">Show sources</button>
        <div id="sources-content" class="sources-content" style="display:none;"></div>
      </div>
      <form id="chat-form">
        <input id="question" placeholder="Ask about your real estate query ..." autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
